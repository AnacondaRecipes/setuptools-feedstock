{% set name = "setuptools" %}
{% set version = "83.0.0" %}

# make sure to set CONDA_ADD_PIP_AS_PYTHON_DEPENDENCY=0 environ-variable before building it locally
package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 025bccbbf0fa05b6192bc64ae1e7b16e001fd6d6d4d5de03c97b1c1ade523bef
  patches:
    - patches/0021-Add-d1trimfile-SRC_DIR-to-make-pdbs-more-relocatable.patch

build:
  number: 0
  skip: true  # [py<310]
  missing_dso_whitelist:  # [win]
    - $RPATH/MSVCR71.dll  # [win]
    - $RPATH/MSVCR80.dll  # [win]

requirements:
  host:
    # omitting wheel for this package to avoid cyclic dependencies
    - python
  run:
    - python
  run_constrained:
    # upstream
    - pytest >=6,!= 8.1.*
    # local
    - virtualenv >=13.0.0
    - wheel >=0.44.0 # Consistent requirement normalisation in METADATA (see #4547)
    - pip >=19.1 # For proper file:// URLs support.
    - packaging >=24.2
    - jaraco.envs >=2.2
    - pytest-xdist >=3 # Dropped dependency on pytest-fork and py
    - jaraco.path >=3.7.2 # Typing fixes
    - build[virtualenv] >=1.0.3
    - filelock >=3.4.0
    - ini2toml[lite]>=0.14
    - tomli-w >=1.0.0
    # for tools/finalize.py
    - jaraco.develop >=7.21  # [py>=39]
    - pytest-home >= 0.5
    # workaround for pypa/pyproject-hooks#206
    - pyproject-hooks !=1.1
    - jaraco.test >=5.5  # py.typed

# Test depends on jaraco packages which are not supported in main channel.
# E   ImportError: cannot import name 'path' from 'jaraco' (unknown location)
{% set ignore_tests = " --ignore=setuptools/tests/config/test_apply_pyprojecttoml.py" %}
