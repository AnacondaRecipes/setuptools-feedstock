{% set disabled_tests = disabled_tests + " --deselect 'setuptools/tests/test_virtualenv.py::test_pip_upgrade_from_source[pip<23]'" %}  # [py<=311]

test:
  source_files:
    - setuptools/tests/
  imports:
    - setuptools
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - python -m pytest -vv setuptools/tests {{ ignore_tests }} {{ disabled_tests }}

about:
  home: https://github.com/pypa/setuptools
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Download, build, install, upgrade, and uninstall Python packages
  description: |
    Setuptools is a fully-featured, actively-maintained, and stable library
    designed to facilitate packaging Python projects.
  doc_url: https://setuptools.pypa.io
  dev_url: https://github.com/pypa/setuptools

extra:
  recipe-maintainers:
    - jakirkham
    - msarahan
    - ocefpaf
    - nicoddemus
    - isuruf
  skip-lints:
    # As we are bootstrapping this build we do not require python build tools
    - missing_python_build_tool
    - python_build_tools_in_host
    - deprecated_python_install_command
